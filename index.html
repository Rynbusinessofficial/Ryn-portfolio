<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ryn - Discord Developer</title>

<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, Arial, sans-serif;
}

body {
  background: radial-gradient(circle at top, #0f1220, #07080f);
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* ===== CURSOR ===== */
.cursor {
  width: 6px;
  height: 6px;
  background: #5865F2;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 10px #5865F2;
  z-index: 9999;
}

.cursor-ring {
  width: 28px;
  height: 28px;
  border: 1px solid rgba(88,101,242,0.35);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 9998;
}

/* ===== CARD ===== */
.card {
  width: 360px;
  padding: 28px;
  border-radius: 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  text-align: center;
  animation: fadeIn 0.8s ease;
}

/* ===== AVATAR ===== */
.avatar {
  width: 95px;
  height: 95px;
  border-radius: 50%;
  border: 2px solid #5865F2;
  margin-bottom: 10px;
}

/* ===== NAME ===== */
h1 {
  font-size: 22px;
  margin-bottom: 4px;
}

.role {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 12px;
}

/* ===== STATUS ===== */
.status {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #aaa;
  margin-bottom: 14px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.dnd { background: #ed4245; }
.online { background: #3ba55d; }
.idle { background: #faa61a; }
.offline { background: gray; }

/* ===== BUTTON ===== */
.btn {
  display: inline-block;
  padding: 10px 16px;
  border-radius: 10px;
  background: #5865F2;
  color: white;
  text-decoration: none;
  font-size: 13px;
  transition: 0.2s ease;
  margin-top: 10px;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(88,101,242,0.25);
}

/* ===== MUSIC ===== */
.music {
  margin-top: 12px;
  font-size: 12px;
  color: #888;
  cursor: pointer;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  .cursor, .cursor-ring { display: none; }
}
</style>
</head>

<body>

<div class="cursor"></div>
<div class="cursor-ring"></div>

<div class="card">

  <img id="avatar" class="avatar" src="" />

  <h1>Ryn</h1>
  <div class="role">Discord Bot Developer</div>

  <div class="status">
    <div id="dot" class="dot"></div>
    <span id="statusText">Loading status...</span>
  </div>

  <p style="font-size:13px; color:#aaa;">
    APIs • Automation • Backend Systems
  </p>

  <a class="btn"
     href="https://discord.com/users/1270370476396384362"
     target="_blank">
    Contact Me
  </a>

  <div class="music" onclick="toggleMusic()">Toggle Music</div>

</div>

<!-- MUSIC (optional clean) -->
<audio id="audio" loop>
  <source src="https://files.catbox.moe/9n3f1m.mp3" type="audio/mp3">
</audio>

<script>
const USER_ID = "1270370476396384362";

/* ===== CURSOR ===== */
const cursor = document.querySelector(".cursor");
const ring = document.querySelector(".cursor-ring");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";

  ring.style.left = e.clientX + "px";
  ring.style.top = e.clientY + "px";
});

/* ===== DISCORD API ===== */
fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`)
.then(res => res.json())
.then(data => {

  const d = data.data;

  document.getElementById("avatar").src =
    `https://cdn.discordapp.com/avatars/${USER_ID}/${d.discord_user.avatar}.png?size=256`;

  const status = d.discord_status;
  const dot = document.getElementById("dot");
  const text = document.getElementById("statusText");

  if (status === "dnd") {
    dot.className = "dot dnd";
    text.innerText = "Do Not Disturb";
  }
  else if (status === "online") {
    dot.className = "dot online";
    text.innerText = "Online";
  }
  else if (status === "idle") {
    dot.className = "dot idle";
    text.innerText = "Idle";
  }
  else {
    dot.className = "dot offline";
    text.innerText = "Offline";
  }
});

/* ===== MUSIC ===== */
const audio = document.getElementById("audio");
function toggleMusic() {
  if (audio.paused) audio.play();
  else audio.pause();
}
</script>

</body>
</html>
